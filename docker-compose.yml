services:

  bruin:
    build: .
    image: bruin-app
    container_name: de_bruin
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./project:/app
    working_dir: /app
    tty: true
    stdin_open: true
    command: sleep infinity
    networks:
      - de_net
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: de_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - de-postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - de_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: de_pgadmin
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - de_net
    depends_on:
      - db

volumes:
  de-postgres-data:
  pgadmin-data:

networks:
  de_net:
    driver: bridge
